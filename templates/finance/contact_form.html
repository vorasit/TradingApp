{% extends 'finance/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-8">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-primary text-white">
                {% if contact %}✏️ แก้ไขข้อมูลคู่ค้า/ลูกค้า{% else %}👥 เพิ่มรายชื่อใหม่{% endif %}
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">ประเภทคู่ค้า</label>
                        <select name="contact_type" class="form-select">
                            <option value="CUSTOMER" {% if contact.contact_type == 'CUSTOMER' %}selected{% endif %}>ลูกค้า (Customer)</option>
                            <option value="SUPPLIER" {% if contact.contact_type == 'SUPPLIER' %}selected{% endif %}>ซัพพลายเออร์ (Supplier)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ชื่อ - นามสกุล หรือ นิติบุคคล <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" value="{{ contact.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">เลขประจำตัวผู้เสียภาษี 13 หลัก</label>
                        <input type="text" name="tax_id" class="form-control" value="{{ contact.tax_id|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ที่อยู่จัดส่ง / ออกบิล</label>
                        <textarea name="address" class="form-control" rows="3">{{ contact.address|default:'' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">💾 บันทึก</button>
                    <a href="{% url 'contact_list' %}" class="btn btn-outline-secondary w-100 mt-2">ยกเลิก</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
